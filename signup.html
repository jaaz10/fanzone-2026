<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FanZone 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Fan<span>Zone</span> 2026</a>
    <nav id="main-nav">
      <a href="index.html">Events</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="auth-card">
    <div class="card">
      <h2>Create Account</h2>
      <div id="alert"></div>
      <form id="signup-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="4" placeholder="At least 4 characters">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign Up</button>
      </form>
    </div>
    <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
  </main>

  <footer>FanZone 2026 Demo · Sprint Board Project</footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    initAuth().then(() => {
      if (getCurrentUser()) {
        window.location.href = "index.html";
      }
    });

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      btn.disabled = true;

      const result = await signup(
        document.getElementById("name").value.trim(),
        document.getElementById("email").value.trim(),
        document.getElementById("password").value
      );

      if (result.ok) {
        window.location.href = "index.html";
      } else {
        showAlert(document.getElementById("alert"), result.message, "error");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
