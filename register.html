<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register for Event — FanZone 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Fan<span>Zone</span> 2026</a>
    <nav id="main-nav">
      <span id="user-greeting" class="user-greeting" style="display:none"></span>
      <a href="index.html">Events</a>
      <a href="my-registrations.html" data-auth="in">My Registrations</a>
      <a href="#" id="logout-btn" data-auth="in">Logout</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>Event Registration</h2>
      <div id="alert"></div>
      <div id="party-info"></div>
      <form id="register-form" style="margin-top:1.5rem">
        <div class="form-row">
          <div class="form-group">
            <label for="guests">Number of Guests</label>
            <select id="guests" required>
              <option value="1">Just me (1)</option>
              <option value="2">2 people</option>
              <option value="3">3 people</option>
              <option value="4">4 people</option>
            </select>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required placeholder="(555) 123-4567">
          </div>
        </div>
        <div class="form-group">
          <label for="notes">Special Requests (optional)</label>
          <textarea id="notes" placeholder="Dietary needs, accessibility, etc."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Registration</button>
        <a href="index.html" class="btn btn-outline" style="margin-left:0.5rem">Cancel</a>
      </form>
    </div>
  </main>

  <footer>FanZone 2026 Demo · Sprint Board Project</footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!requireAuth("login.html")) throw new Error("auth required");

    const params = new URLSearchParams(window.location.search);
    const partyId = params.get("party");
    const party = getPartyById(partyId);

    if (!party) {
      document.querySelector("main").innerHTML =
        '<div class="card"><p>Event not found. <a href="index.html">Back to events</a></p></div>';
    } else {
      document.getElementById("party-info").innerHTML = renderEventCard(party, { showRegister: false });

      document.getElementById("register-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const user = getCurrentUser();
        const result = createRegistration({
          userEmail: user.email,
          userName: user.name,
          partyId: party.id,
          partyTitle: party.title,
          city: party.city,
          date: party.date,
          guests: parseInt(document.getElementById("guests").value, 10),
          phone: document.getElementById("phone").value.trim(),
          notes: document.getElementById("notes").value.trim(),
        });

        if (result.ok) {
          showAlert(
            document.getElementById("alert"),
            "Registration confirmed! Redirecting to your registrations…",
            "success"
          );
          setTimeout(() => (window.location.href = "my-registrations.html"), 1500);
        } else {
          showAlert(document.getElementById("alert"), result.message, "error");
        }
      });
    }
  </script>
</body>
</html>
