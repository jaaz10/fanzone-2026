<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Organizer — FanZone 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Fan<span>Zone</span> 2026</a>
    <nav id="main-nav">
      <span id="user-greeting" class="user-greeting" style="display:none"></span>
      <a href="index.html">Events</a>
      <a href="my-registrations.html" data-auth="in">My Registrations</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="login.html" data-auth="out">Login</a>
      <a href="#" id="logout-btn" data-auth="in">Logout</a>
    </nav>
  </header>

  <main>
    <div class="card" style="max-width:560px; margin:0 auto">
      <h2>Contact Organizer</h2>
      <p style="color:var(--muted); margin-bottom:1.25rem">
        Have a question about a viewing party? Send a message to the event organizers.
      </p>
      <div id="alert"></div>
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="event">Event (optional)</label>
          <select id="event">
            <option value="">General inquiry</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" required placeholder="Your question or message…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </main>

  <footer>FanZone 2026 Demo · Sprint Board Project</footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      await initAuth();

      const eventSelect = document.getElementById("event");
      try {
        const parties = await fetchParties();
        parties.forEach((p) => {
          const opt = document.createElement("option");
          opt.value = p.id;
          opt.textContent = `${p.title} (${p.city})`;
          eventSelect.appendChild(opt);
        });
      } catch {
        showAlert(document.getElementById("alert"), "Could not load events for the dropdown.", "error");
      }

      const user = getCurrentUser();
      if (user) {
        document.getElementById("name").value = user.name;
        document.getElementById("email").value = user.email;
      }

      document.getElementById("contact-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector("button");
        btn.disabled = true;

        const result = await sendContactMessage({
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          message: document.getElementById("message").value.trim(),
          partyId: document.getElementById("event").value,
        });

        if (result.ok) {
          showAlert(document.getElementById("alert"), result.message, "success");
          e.target.reset();
          if (user) {
            document.getElementById("name").value = user.name;
            document.getElementById("email").value = user.email;
          }
        } else {
          showAlert(document.getElementById("alert"), result.message, "error");
        }

        btn.disabled = false;
      });
    })();
  </script>
</body>
</html>
