<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FanZone 2026 — Viewing Parties</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Fan<span>Zone</span> 2026</a>
    <nav id="main-nav">
      <span id="user-greeting" class="user-greeting" style="display:none"></span>
      <a href="index.html" class="active">Events</a>
      <a href="my-registrations.html" data-auth="in">My Registrations</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" data-auth="out">Login</a>
      <a href="signup.html" data-auth="out">Sign Up</a>
      <a href="#" id="logout-btn" data-auth="in">Logout</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>World Cup 2026 Viewing Parties</h1>
      <p>Find and register for fan watch parties in cities across North America.</p>
    </section>

    <section class="card">
      <h2>Upcoming Viewing Parties</h2>
      <div class="filters">
        <div class="form-group" style="flex:1; min-width:200px; margin:0">
          <label for="city-filter">Filter by City</label>
          <select id="city-filter">
            <option value="">All Cities</option>
          </select>
        </div>
      </div>
      <div id="event-list" class="event-list"></div>
      <div id="no-events" class="empty-state" style="display:none">
        No viewing parties found for this city.
      </div>
    </section>
  </main>

  <footer>FanZone 2026 Demo · Sprint Board Project</footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    const cityFilter = document.getElementById("city-filter");
    const eventList = document.getElementById("event-list");
    const noEvents = document.getElementById("no-events");

    CITIES.forEach((city) => {
      const opt = document.createElement("option");
      opt.value = city;
      opt.textContent = city;
      cityFilter.appendChild(opt);
    });

    function renderEvents(city) {
      const filtered = city
        ? VIEWING_PARTIES.filter((p) => p.city === city)
        : VIEWING_PARTIES;

      if (filtered.length === 0) {
        eventList.innerHTML = "";
        noEvents.style.display = "block";
        return;
      }

      noEvents.style.display = "none";
      eventList.innerHTML = filtered.map((p) => renderEventCard(p)).join("");
    }

    cityFilter.addEventListener("change", () => renderEvents(cityFilter.value));
    renderEvents("");
  </script>
</body>
</html>
