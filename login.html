<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FanZone 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">Fan<span>Zone</span> 2026</a>
    <nav id="main-nav">
      <a href="index.html">Events</a>
      <a href="signup.html">Sign Up</a>
    </nav>
  </header>

  <main class="auth-card">
    <div class="card">
      <h2>Log In</h2>
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Log In</button>
      </form>
    </div>
    <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
  </main>

  <footer>FanZone 2026 Demo · Sprint Board Project</footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (getCurrentUser()) {
      window.location.href = "index.html";
    }

    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const result = login(
        document.getElementById("email").value.trim(),
        document.getElementById("password").value
      );
      if (result.ok) {
        window.location.href = "index.html";
      } else {
        showAlert(document.getElementById("alert"), result.message, "error");
      }
    });
  </script>
</body>
</html>
